---
- name: Deploy node app on EC2
  hosts: all
  become: yes
  vars:
    app_dir: /opt/app
    app_port: 3000
    app_name: node_test_1

  handlers:
    - name: reload nginx
      service:
        name: nginx
        state: reloaded

    - name: restart nginx
      service:
        name: nginx
        state: restarted

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - git
          - nginx
          - build-essential
        state: present

    - name: Install Node.js 20.x
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Pull app from GitHub
      git:
        repo: "https://github.com/{{ lookup('env', 'GITHUB_REPOSITORY') }}.git"
        dest: "{{ app_dir }}"
        version: HEAD
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become: yes
      become_user: ubuntu

    - name: Write .env file
      copy:
        dest: "{{ app_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
        content: |
          {% if node_env_database_url is defined and node_env_database_url != '' %}
          DATABASE_URL={{ node_env_database_url }}
          {% endif %}
          {% if node_env_mongo_uri is defined and node_env_mongo_uri != '' %}
          MONGO_URI={{ node_env_mongo_uri }}
          {% endif %}
          {% if node_env_db_host is defined and node_env_db_host != '' %}
          DB_HOST={{ node_env_db_host }}
          {% endif %}
          {% if node_env_db_port is defined and node_env_db_port != '' %}
          DB_PORT={{ node_env_db_port }}
          {% endif %}
          {% if node_env_db_name is defined and node_env_db_name != '' %}
          DB_NAME={{ node_env_db_name }}
          {% endif %}
          {% if node_env_db_user is defined and node_env_db_user != '' %}
          DB_USER={{ node_env_db_user }}
          {% endif %}
          {% if node_env_db_password is defined and node_env_db_password != '' %}
          DB_PASSWORD={{ node_env_db_password }}
          {% endif %}
          PORT={{ app_port }}

    - name: Install npm dependencies
      npm:
        path: "{{ app_dir }}"
        state: present
      become: yes
      become_user: ubuntu

    - name: Install local DB if requested
      block:
        - name: Install PostgreSQL
          block:
            - name: Install PostgreSQL packages
              apt:
                name:
                  - postgresql
                  - postgresql-contrib
                state: present

            - name: Start and enable PostgreSQL
              service:
                name: postgresql
                state: started
                enabled: yes

            - name: Fix pg_hba to use md5 auth
              shell: |
                PG_HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
                sed -i 's/^local\s\+all\s\+all\s\+peer/local all all md5/' "$PG_HBA"
                sed -i 's/^host\s\+all\s\+all\s\+127\.0\.0\.1\/32\s\+ident/host all all 127.0.0.1\/32 md5/' "$PG_HBA"
                systemctl reload postgresql
              args:
                executable: /bin/bash

            - name: Create PostgreSQL database and user
              shell: |
                sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username }}'" | grep -q 1 || \
                  sudo -u postgres psql -c "CREATE USER {{ db_username }} WITH PASSWORD '{{ db_password }}';"
                sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || \
                  sudo -u postgres psql -c "CREATE DATABASE {{ db_name }} OWNER {{ db_username }};"
                sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};"
              args:
                executable: /bin/bash
              when:
                - db_name is defined and db_name != ''
                - db_username is defined and db_username != ''
                - db_password is defined and db_password != ''
          when: db_type | lower == 'postgresql' or db_type | lower == 'postgres'

        - name: Install MySQL
          block:
            - name: Install MySQL packages
              apt:
                name:
                  - mysql-server
                  - python3-mysqldb
                state: present

            - name: Start and enable MySQL
              service:
                name: mysql
                state: started
                enabled: yes

            - name: Create MySQL database and user
              shell: |
                mysql -u root -e "CREATE DATABASE IF NOT EXISTS \`{{ db_name }}\`;"
                mysql -u root -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}';"
                mysql -u root -e "GRANT ALL PRIVILEGES ON \`{{ db_name }}\`.* TO '{{ db_username }}'@'localhost';"
                mysql -u root -e "FLUSH PRIVILEGES;"
              args:
                executable: /bin/bash
              when:
                - db_name is defined and db_name != ''
                - db_username is defined and db_username != ''
                - db_password is defined and db_password != ''
          when: db_type | lower == 'mysql'

        - name: Install MongoDB
          block:
            - name: Add MongoDB apt key
              shell: |
                curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
              args:
                creates: /usr/share/keyrings/mongodb-server-7.0.gpg

            - name: Add MongoDB apt repository
              copy:
                content: "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse\n"
                dest: /etc/apt/sources.list.d/mongodb-org-7.0.list
                mode: "0644"

            - name: Update apt cache after adding MongoDB repo
              apt:
                update_cache: yes

            - name: Install MongoDB
              apt:
                name: mongodb-org
                state: present

            - name: Start and enable MongoDB
              service:
                name: mongod
                state: started
                enabled: yes

            - name: Create MongoDB database and user
              shell: |
                mongosh --quiet --eval "
                  use {{ db_name }};
                  if (db.getUsers({ usersInfo: '{{ db_username }}' }).users.length === 0) {
                    db.createUser({
                      user: '{{ db_username }}',
                      pwd: '{{ db_password }}',
                      roles: [{ role: 'readWrite', db: '{{ db_name }}' }]
                    });
                  }
                "
              args:
                executable: /bin/bash
              when:
                - db_name is defined and db_name != ''
                - db_username is defined and db_username != ''
                - db_password is defined and db_password != ''
          when: db_type | lower == 'mongodb' or db_type | lower == 'mongo'
      when: install_db is defined and install_db | string | lower in ['true', '1', 'yes']

    - name: Start app with PM2
      shell: |
        cd {{ app_dir }}
        pm2 delete app 2>/dev/null || true
        pm2 start server.js --name app
        pm2 save
        env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu | tail -1 | bash || true
      args:
        executable: /bin/bash
      become: yes
      become_user: ubuntu
      environment:
        NODE_ENV: production

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-enabled/app
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://0.0.0.0:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_cache_bypass $http_upgrade;
              }
          }
      notify: restart nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Force nginx restart to apply config
      service:
        name: nginx
        state: restarted

    - name: Wait for app to be ready on port 3000
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        timeout: 120
        delay: 10
      register: app_wait
      ignore_errors: yes

    - name: Print PM2 logs if app did not start
      shell: pm2 logs --lines 100 app --nostream
      become: yes
      become_user: ubuntu
      when: app_wait is failed

    - name: Fail if app did not start
      fail:
        msg: "Application failed to start on port {{ app_port }}. Check PM2 logs above."
      when: app_wait is failed

    - name: Print server IP
      debug:
        msg: "server_ip={{ ansible_host }}"